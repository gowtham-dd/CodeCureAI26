artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: https://github.com/gowtham-dd/Datasets/raw/main/tox21.zip   # update to your actual zip URL
  local_data_file: artifacts/data_ingestion/data.zip
  unzip_dir: artifacts/data_ingestion
  final_data_file: artifacts/data_ingestion/tox21.csv   # path after extraction

data_validation:
  root_dir: artifacts/data_validation
  STATUS_FILE: artifacts/data_validation/status.txt
  data_path: artifacts/data_ingestion/tox21.csv

data_transformation:
  root_dir: artifacts/data_transformation
  data_path: artifacts/data_ingestion/tox21.csv
  features_path: artifacts/data_transformation/X.npy
  labels_path: artifacts/data_transformation/y.npy
  selector_path: artifacts/data_transformation/selector.pkl
  scaler_path: artifacts/data_transformation/scaler.pkl

model_trainer:
  root_dir: artifacts/model_trainer
  transformed_data_dir: artifacts/data_transformation
  model_bundle_path: artifacts/model_trainer/tox21_model_bundle.pkl

model_evaluation:
  root_dir: artifacts/model_evaluation
  transformed_data_dir: artifacts/data_transformation
  model_bundle_path: artifacts/model_trainer/tox21_model_bundle.pkl
  metric_file_name: artifacts/model_evaluation/metrics.json
  roc_plot_path: artifacts/model_evaluation/roc_curves.png
  pr_plot_path: artifacts/model_evaluation/pr_curves.png
